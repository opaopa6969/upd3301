<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>CRT VIDEO PLAYER — なんでもブラウン管</title>
<style>
  :root { color-scheme: dark; }
  body { background:#101014; color:#ccd; font-family:ui-monospace,monospace; margin:24px; }
  h1 { font-size:18px; color:#8fd; }
  canvas { image-rendering:pixelated; border:12px solid #222; border-radius:8px; background:#000; max-width:100%; }
  .row { margin:10px 0; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .row .lbl { color:#778; min-width:70px; }
  button, input[type=file]::file-selector-button { background:#223; color:#cde; border:1px solid #446; border-radius:4px; padding:6px 12px; cursor:pointer; }
  button.on { background:#265; border-color:#4a8; }
  #guts { font-size:12px; color:#889; white-space:pre; }
  .note { color:#778; font-size:12px; max-width:700px; }
  .knobs label { display:flex; flex-direction:column; align-items:center; font-size:11px; color:#9ab; }
  .knobs input[type=range] { width:100px; accent-color:#4a8; }
  video { display:none; }
  #stage { position:relative; display:inline-block; max-width:100%; }
  #vbar { display:flex; gap:10px; align-items:center; margin-top:6px; font-size:12px; color:#9ab; }
  #seek { flex:1; min-width:200px; accent-color:#4a8; }
  #kvol { width:70px; accent-color:#4a8; }
  #stage:fullscreen { display:flex; align-items:center; justify-content:center; width:100%; height:100%; background:#000; }
  #stage:fullscreen canvas { width:min(100vw, calc(100vh * 4 / 3)); height:auto; border:none; border-radius:0; }
  #stage:fullscreen #vbar { position:absolute; left:0; right:0; bottom:0; margin:0; padding:12px 18px;
    background:linear-gradient(transparent, rgba(0,0,0,.75)); transition:opacity .3s; }
  #stage.idle:fullscreen #vbar { opacity:0; }
  #stage.idle:fullscreen { cursor:none; }
  #fspanel { display:none; }
  #fspanel.open { display:block; position:absolute; top:12px; left:12px; right:12px;
    max-height:72vh; overflow-y:auto; background:rgba(10,10,16,.92); border:1px solid #446;
    border-radius:8px; padding:10px 14px; z-index:5; }
</style>
<script type="importmap">
{"imports":{
 "/index.js":"/index.js?v=cache1","/upd8257.js":"/upd8257.js?v=cache1",
 "/pc8001.js":"/pc8001.js?v=cache1","/crt.js":"/crt.js?v=cache1",
 "/tube.js":"/tube.js?v=cache1","/term.js":"/term.js?v=cache1",
 "/semivideo.js":"/semivideo.js?v=cache1","/z80.js":"/z80.js?v=cache1",
 "/demo/font.js":"/demo/font.js?v=cache1"
}}
</script>
</head>
<body>
<h1>CRT VIDEO PLAYER — 手持ちの動画をブラウン管で観る</h1>
<p class="note" id="navrow"></p>
<div id="stage">
  <canvas id="crt" width="640" height="480"></canvas>
  <div id="fspanel"></div>
  <div id="vbar">
    <button id="bplay">⏯</button>
    <input type="range" id="seek" min="0" max="1000" value="0">
    <span id="vtime">--:-- / --:--</span>
    <button id="bmute">🔇</button>
    <input type="range" id="kvol" min="0" max="1" step="0.05" value="0.8">
    <label style="font-size:11px;color:#9ab">BEEP<input type="checkbox" id="cbeep" style="margin:2px"></label>
    <button id="bsettings">⚙ 設定</button>
    <button id="bfull">⛶ 全画面</button>
  </div>
</div>
<div class="row">
  <input type="file" id="file" accept="video/*">
  <button id="bcam">Webカメラ</button>
  <button id="bshare">🖥 画面/タブ共有</button>
  <button id="bpower" class="on">POWER</button>
  <button id="brec">⏺ 録画</button>
</div>
<div class="row"><span class="lbl">蛍光体:</span>
  <button id="pP22" class="on">P22</button>
  <button id="pLONG">長残光</button>
  <button id="pP39">P39緑</button>
  <button id="pP7">P7レーダー</button>
  <button id="pAMBER">アンバー</button>
  <button id="pPLASMA">プラズマ橙</button>
  <button id="bburn">焼き付き</button>
</div>
<div class="row"><span class="lbl">管:</span>
  <button id="tnone">物理OFF</button>
  <button id="taperture" class="on">グリル</button>
  <button id="tshadow">シャドウ</button>
  <button id="tslot">スロット</button>
  <button id="tplasma">プラズマ格子</button>
  <button id="binterlace">インターレース</button>
  <label style="color:#778;font-size:12px">ガラス反射<input type="checkbox" id="cghost" checked style="margin:2px"></label>
  <button id="b400">400ライン</button>
</div>
<div class="row knobs"><span class="lbl">ノブ:</span>
  <label>FOCUS <input type="range" id="kfocus" min="0" max="2" step="0.05" value="0.8"></label>
  <label>H-SIZE <input type="range" id="khsize" min="0.7" max="1.15" step="0.01" value="1"></label>
  <label>V-SIZE <input type="range" id="kvsize" min="0.7" max="1.15" step="0.01" value="1"></label>
  <label>BRIGHT <input type="range" id="kbright" min="0.4" max="3" step="0.05" value="1.2"></label>
  <label>PITCH <input type="range" id="kpitch" min="2" max="9" step="1" value="3"></label>
  <label>CONV <input type="range" id="kconv" min="0" max="0.02" step="0.001" value="0.004"></label>
  <label>BARREL <input type="range" id="kbarrel" min="-0.12" max="0.25" step="0.01" value="0.07"></label>
  <label>CONTRAST <input type="range" id="kcontrast" min="0.5" max="1.8" step="0.05" value="1"></label>
  <label>TINT<input type="checkbox" id="ctint" style="margin:2px"> <input type="range" id="ktint" min="-60" max="60" step="1" value="0"></label>
  <label>フリッカー<input type="checkbox" id="cflick" style="margin:2px"></label>
  <label>V-HOLD <input type="range" id="kvhold" min="-20" max="20" step="0.5" value="0"></label>
</div>
<div id="guts"></div>
<p class="note" id="note-player">
  μPD3301は不使用ｗ — crt.js（蛍光体：ガン別2成分減衰・発光色・焼き付き）と
  tube.js（マスク・ビームスポット・収束誤差・ガラス）だけを、アナログ駆動
  （stepAnalog：sRGB→リニア化して励起）で任意の映像に適用するプレイヤー。
  P7レーダー管で観る動画、最高だから試して。POWERで偏向崩壊も動く。
</p>
<script type="module">
import { applyI18n, t } from './i18n.js';
applyI18n();
import { mountNav } from './nav.js';
mountNav('crt-player.html');
// ---- fold CRT-setting category rows into a menu bar + dock ------------------
import { mountMenuBar } from './menubar.js';
(() => {
  let mm = document.getElementById('menubar-mount');
  if (!mm) { mm = document.createElement('div'); mm.id = 'menubar-mount'; document.getElementById('navrow')?.after(mm); }
  const catRow = (txt) => [...document.querySelectorAll('.row')].find((r) => r.firstElementChild?.classList?.contains('lbl') && r.firstElementChild.textContent.replace(/[:：]\s*$/, '') === txt);
  const menus = [['蛍光体', '💡 蛍光体'], ['管', '📺 管'], ['ノブ', '🎛 ノブ']].map(([txt, label]) => {
    const row = catRow(txt); if (!row) return null;
    const grp = document.createElement('span'); grp.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;align-items:center';
    const lbl = row.firstElementChild;
    [...row.children].forEach((c) => { if (c !== lbl) grp.appendChild(c); });
    row.dataset.catMenu = '1';
    return { label, items: [{ id: 'cat-' + txt, label, el: grp }] };
  }).filter(Boolean);
  if (menus.length) { mountMenuBar(mm, { storageKey: 'menubar-crtplayer', brand: 'CRT', menus }); document.querySelectorAll('.row[data-cat-menu]').forEach((r) => { r.style.display = 'none'; }); }
})();
import { CrtPhosphor, PHOSPHORS, rollScan } from '../crt.js';
import { CrtTube } from '../tube.js';

const SW = 640, SH = 240;
const canvas = document.getElementById('crt');
const ctx = canvas.getContext('2d');
const guts = document.getElementById('guts');
const video = document.createElement('video');
video.muted = true; video.loop = true; video.playsInline = true;
document.body.appendChild(video);

let status = '';
const say = (m) => { status = m; };
window.onerror = (m) => say('ERROR: ' + m);
video.addEventListener('error', () => {
  const codes = { 3: 'DECODE (コーデック非対応かも)', 4: 'SRC_NOT_SUPPORTED (この形式は無理)' };
  say('video error: ' + (codes[video.error?.code] ?? video.error?.code));
});
video.addEventListener('loadeddata', () => say(`loaded ${video.videoWidth}x${video.videoHeight}`));

function makeGrab(w, h) {
  if (typeof OffscreenCanvas !== 'undefined') {
    return new OffscreenCanvas(w, h).getContext('2d', { willReadFrequently: true });
  }
  const c = document.createElement('canvas');
  c.width = w; c.height = h; c.style.display = 'none';
  document.body.appendChild(c);
  return c.getContext('2d', { willReadFrequently: true });
}
const grab = makeGrab(SW, SH);

const phosphor = new CrtPhosphor({ width: SW, height: SH, phosphor: PHOSPHORS.P22 });
let phosName = 'P22';
const knobs = { focus: 0.8, hSize: 1, vSize: 1, bright: 1.2, pitch: 3, conv: 0.004, barrel: 0.07, contrast: 1, tint: 0, tintOn: false, vhold: 0, ghost: 0.07, flickerOn: false };
// flicker feel: ~10Hz camera-beat luminance throb (a 60Hz raster on a 60Hz
// display cancels out; the beat is what reads as CRT flicker). Deterministic.
let _flickPhase = 0;
function flickScale(base) {
  if (!knobs.flickerOn) return base;
  _flickPhase++;
  const beat = Math.sin(_flickPhase * 2 * Math.PI * 10 / 60);
  const hum = Math.sin(_flickPhase * 2 * Math.PI * 1.7 / 60);
  return base * (1 - 0.10 * (0.5 + 0.5 * beat) - 0.04 * (0.5 + 0.5 * hum));
}

let tubeMode = 'aperture', interlaced = false;
const tubes = {};
function getTube() {
  if (!tubes[tubeMode]) {
    tubes[tubeMode] = new CrtTube({
      srcWidth: SW, srcHeight: SH, outWidth: 640, outHeight: 480,
      mask: tubeMode, maskPitch: knobs.pitch, convergence: knobs.conv, barrel: knobs.barrel, ghost: knobs.ghost,
      beamWidth: knobs.focus, hSize: knobs.hSize, vSize: knobs.vSize,
    });
  }
  return tubes[tubeMode];
}

const img = ctx.createImageData(640, 480);
const frameBuf = new Uint8ClampedArray(SW * SH * 4);
const darkBuf = new Uint8ClampedArray(SW * SH * 4);
let rgbaSmall = null;

// analog power-off: pile the shrinking raster toward the center, max-combined
function collapseRGBA(src, dst, hS, vS) {
  dst.fill(0);
  const cx = (SW - 1) / 2, cy = (SH - 1) / 2;
  for (let y = 0; y < SH; y++) {
    const ty = Math.round(cy + (y - cy) * vS);
    for (let x = 0; x < SW; x++) {
      const s = (y * SW + x) * 4;
      const tx = Math.round(cx + (x - cx) * hS);
      const d = (ty * SW + tx) * 4;
      for (let c = 0; c < 3; c++) if (src[s + c] > dst[d + c]) dst[d + c] = src[s + c];
      dst[d + 3] = 255;
    }
  }
}
const collapseBuf = new Uint8ClampedArray(SW * SH * 4);
const rollBuf = new Uint8ClampedArray(SW * SH * 4);
let rollPos = 0;
function vholdApply(src, dst) {
  const blank = 28, total = SH + blank;
  if (knobs.vhold !== 0) {
    const wobble = 1 + 0.8 * Math.sin(rollPos / total * Math.PI * 2);
    rollPos = (rollPos + knobs.vhold * wobble + total) % total;
  } else if (rollPos !== 0) {
    rollPos = rollPos < total / 2 ? rollPos * 0.8 : total - (total - rollPos) * 0.8;
    if (rollPos < 0.6 || rollPos > total - 0.6) rollPos = 0;
  }
  if (rollPos === 0) return src;
  const stretch = 1 + Math.min(0.5, Math.abs(knobs.vhold) * 0.03)
    * Math.sin(rollPos / total * Math.PI * 4);
  return rollScan(src, dst, SW, SH, Math.round(rollPos) % total, blank, 4, stretch);
}
const power = { state: 'on', t: 0 };

function grabFrame() { // once per displayed frame — 4K decode+downscale is the
  // expensive part, so never do it more than once per rAF
  if (video.readyState >= 2) {
    grab.drawImage(video, 0, 0, SW, SH);
    frameBuf.set(grab.getImageData(0, 0, SW, SH).data);
  }
}

function beamPass() {
  const parity = interlaced ? (frameNo & 1) : null;
  if (power.state === 'on') {
    phosphor.stepAnalog(vholdApply(frameBuf, rollBuf), FR, { fieldParity: parity });
    return;
  }
  if (power.state === 'off') { phosphor.stepAnalog(darkBuf, FR); return; }
  power.t += FR;
  const closing = power.state === 'closing';
  const k = Math.min(1, power.t / (closing ? 0.55 : 0.18));
  const c = closing ? k : 1 - k;
  const vS = Math.max(0.008, Math.pow(1 - c, 2.6));
  const hS = Math.max(0.01, 1 - c * c * 0.99);
  collapseRGBA(frameBuf, collapseBuf, hS, vS);
  phosphor.drive = Math.min(8, 1 / Math.max(hS * vS, 1 / 8));
  phosphor.stepAnalog(collapseBuf, FR);
  phosphor.drive = 1;
  if (k >= 1) power.state = closing ? 'off' : 'on';
}

function blit() {
  const d = img.data;
  if (tubeMode === 'none') {
    rgbaSmall = phosphor.toRGBA(rgbaSmall, { scale: flickScale(knobs.bright), tint: knobs.tintOn ? knobs.tint : 0, contrast: knobs.contrast });
    for (let y = 0; y < SH; y++) {
      for (let x = 0; x < SW; x++) {
        const s = (y * SW + x) * 4;
        let o = (y * 2 * 640 + x) * 4;
        d[o] = rgbaSmall[s]; d[o + 1] = rgbaSmall[s + 1]; d[o + 2] = rgbaSmall[s + 2]; d[o + 3] = 255;
        o += 640 * 4;
        d[o] = rgbaSmall[s] * line2; d[o + 1] = rgbaSmall[s + 1] * line2; d[o + 2] = rgbaSmall[s + 2] * line2; d[o + 3] = 255;
      }
    }
  } else {
    getTube().apply(phosphor.composite(), d, { scale: flickScale(knobs.bright), tint: knobs.tintOn ? knobs.tint : 0, contrast: knobs.contrast });
  }
  ctx.putImageData(img, 0, 0);
}

const FR = 1 / 60;
let last = performance.now(), acc = 0, frameNo = 0, workMs = 0;
function loop(now) {
  acc += Math.min(0.1, (now - last) / 1000);
  last = now;
  const t0 = performance.now();
  // interlaced: grab a new frame every OTHER field, so both fields of a
  // pair come from the same source frame — no combing on moving edges
  // (2:2 pulldown, the film/anime-correct behavior)
  if (!interlaced || (frameNo & 1) === 0) grabFrame();
  let steps = 0;
  while (acc >= FR && steps < 2) { acc -= FR; steps++; frameNo++; beamPass(); }
  if (acc > FR) acc = 0; // can't keep up: drop the backlog instead of spiraling
  if (steps) blit();
  workMs = workMs * 0.9 + (performance.now() - t0) * 0.1;
  guts.textContent =
    `${workMs.toFixed(1)}ms/frame${workMs > 24 ? ' (' + t('重い: 物理OFFかFOCUS 0を試して') + ')' : ''}  ` +
    `phosphor=${PHOSPHORS[phosName].name}  tube=${tubeMode}${interlaced ? '  interlaced' : ''}` +
    `${phosphor.burnRate ? '  burn-in!' : ''}  power=${power.state}` +
    `  video=${video.videoWidth}x${video.videoHeight} rs=${video.readyState}${video.paused ? ' paused' : ''}\n${status}`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

let line2 = 0.55; // 200-line: visible scanline gaps; 400-line: solid
const $ = (id) => document.getElementById(id);
function tryPlay() {
  const p = video.play();
  if (p && p.catch) p.catch((err) => say('play(): ' + err.message + ' — ⏯を押して'));
}
$('file').onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  say('loading ' + f.name + ' ...');
  video.srcObject = null;
  video.src = URL.createObjectURL(f);
  video.load();
  tryPlay();
};
$('bshare').onclick = async () => {
  // YouTube and friends: play the video in another tab, share that tab
  // here, and the frames flow through the same pipeline as a local file.
  // (Tick "share tab audio" in the picker to bring the sound along.
  // DRM'd streams arrive as black frames — that's the DRM, not us.)
  try {
    video.removeAttribute('src');
    video.srcObject = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30 }, audio: true,
    });
    tryPlay();
  } catch (err) { say('share: ' + err.message); }
};
$('bcam').onclick = async () => {
  try {
    video.removeAttribute('src');
    video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
    tryPlay();
  } catch (err) { say('webcam: ' + err.message); }
};
$('bplay').onclick = () => { video.paused ? tryPlay() : video.pause(); };

// ---- video bar -----------------------------------------------------------
// ---- recording: canvas → MP4 (or WebM fallback) -------------------------
let recorder = null, recChunks = [], recCtxA = null, recDest = null, recRouted = false;
let beepOn = false, directGain = null, beepGain = null;
function recAudioTracks() {
  try {
    recCtxA ??= new AudioContext();
    if (!recRouted) {
      const src = recCtxA.createMediaElementSource(video);
      recDest = recCtxA.createMediaStreamDestination();
      // two paths: direct, and 1-bit BEEP (comparator waveshaper — the
      // whole soundtrack becomes the port-40h square-wave family ｗ)
      directGain = recCtxA.createGain();
      beepGain = recCtxA.createGain();
      const shaper = recCtxA.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) curve[i] = i < 128 ? -1 : 1;
      shaper.curve = curve;
      const beepVol = recCtxA.createGain();
      beepVol.gain.value = 0.12; // 1-bit is LOUD
      src.connect(directGain);
      src.connect(shaper).connect(beepVol).connect(beepGain);
      for (const g of [directGain, beepGain]) {
        g.connect(recCtxA.destination);
        g.connect(recDest);
      }
      directGain.gain.value = beepOn ? 0 : 1;
      beepGain.gain.value = beepOn ? 1 : 0;
      recRouted = true;
    }
    recCtxA.resume?.();
    return recDest.stream.getAudioTracks();
  } catch { return []; }
}
function setBeep(on) {
  beepOn = on;
  recAudioTracks(); // wire the graph if not yet
  if (directGain) { directGain.gain.value = on ? 0 : 1; beepGain.gain.value = on ? 1 : 0; }
}
$('brec').onclick = () => {
  if (recorder) { recorder.stop(); return; }
  if (!canvas.captureStream || typeof MediaRecorder === 'undefined') { say(t('録画非対応のブラウザ')); return; }
  const stream = canvas.captureStream(60);
  for (const tr of recAudioTracks()) stream.addTrack(tr);
  const mime = ['video/mp4;codecs=avc1,mp4a.40.2', 'video/mp4', 'video/webm;codecs=vp9,opus', 'video/webm']
    .find((m) => MediaRecorder.isTypeSupported(m)) ?? '';
  // one-pass recording: play from the current position, stop by itself
  // when the video ends (loop is suspended for the take)
  const onEnded = () => { if (recorder) recorder.stop(); };
  recorder = new MediaRecorder(stream, { mimeType: mime || undefined, videoBitsPerSecond: 12_000_000 });
  recChunks = [];
  recorder.ondataavailable = (e) => { if (e.data.size) recChunks.push(e.data); };
  recorder.onstop = () => {
    const ext = (recorder.mimeType || mime).includes('mp4') ? 'mp4' : 'webm';
    const blob = new Blob(recChunks, { type: recorder.mimeType || 'video/webm' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `upd3301-${Date.now()}.${ext}`;
    a.click();
    recorder = null;
    video.loop = true;
    video.removeEventListener('ended', onEnded);
    $('brec').textContent = t('⏺ 録画');
    $('brec').classList.remove('on');
    say(ext === 'mp4' ? t('MP4を保存した') : t('WebMを保存した（MP4化: ffmpeg -i in.webm out.mp4）'));
  };
  recorder.start(1000);
  video.loop = false;
  video.addEventListener('ended', onEnded, { once: true });
  tryPlay();
  $('brec').textContent = t('■ 停止');
  $('brec').classList.add('on');
  say(t('録画中…' ) + (mime.includes('mp4') ? ' (mp4)' : ' (webm)'));
};

const fmt = (s) => (Number.isFinite(s)
  ? `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}` : '--:--');
let seeking = false;
video.addEventListener('timeupdate', () => {
  if (!seeking && Number.isFinite(video.duration) && video.duration > 0) {
    $('seek').value = String(video.currentTime / video.duration * 1000);
  }
  $('vtime').textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
});
$('seek').oninput = () => { seeking = true; };
$('seek').onchange = () => {
  if (Number.isFinite(video.duration) && video.duration > 0) {
    video.currentTime = (+$('seek').value) / 1000 * video.duration;
  }
  seeking = false;
};
function syncMute() { $('bmute').textContent = video.muted || video.volume === 0 ? '🔇' : '🔊'; }
$('bmute').onclick = () => { video.muted = !video.muted; syncMute(); };
$('cbeep').onchange = (e) => setBeep(e.target.checked);
$('kvol').oninput = (e) => { video.volume = +e.target.value; video.muted = video.volume === 0; syncMute(); };

// ---- fullscreen ------------------------------------------------------------
const stage = $('stage');
const fspanel = $('fspanel');
const rowHomes = new Map();
function openSettings() {
  for (const row of [...document.querySelectorAll('body > .row')]) {
    rowHomes.set(row, { parent: row.parentNode, next: row.nextSibling });
    fspanel.appendChild(row);
  }
  fspanel.classList.add('open');
}
function closeSettings() {
  fspanel.classList.remove('open');
  for (const [row, home] of [...rowHomes]) {
    home.parent.insertBefore(row, home.next);
    rowHomes.delete(row);
  }
}
$('bsettings').onclick = () => {
  if (fspanel.classList.contains('open')) closeSettings();
  else openSettings();
};
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) closeSettings();
});
$('bfull').onclick = () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else stage.requestFullscreen?.();
};
let idleTimer = null;
stage.addEventListener('mousemove', () => {
  stage.classList.remove('idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => stage.classList.add('idle'), 2500);
});

$('bpower').onclick = () => {
  if (power.state === 'on' || power.state === 'opening') { power.state = 'closing'; power.t = 0; $('bpower').classList.remove('on'); }
  else { power.state = 'opening'; power.t = 0; $('bpower').classList.add('on'); }
};
const phosBtns = { P22: $('pP22'), LONG: $('pLONG'), P39: $('pP39'), P7: $('pP7'), AMBER: $('pAMBER'), PLASMA: $('pPLASMA') };
for (const [k, el] of Object.entries(phosBtns)) {
  el.onclick = () => {
    phosName = k;
    phosphor.setPhosphor(PHOSPHORS[k]);
    for (const [k2, el2] of Object.entries(phosBtns)) el2.classList.toggle('on', k2 === k);
  };
}
$('bburn').onclick = () => { phosphor.setBurnRate(phosphor.burnRate ? 0 : 1.5); $('bburn').classList.toggle('on', phosphor.burnRate > 0); };
const tubeBtns = { none: $('tnone'), aperture: $('taperture'), shadow: $('tshadow'), slot: $('tslot'), plasma: $('tplasma') };
for (const [k, el] of Object.entries(tubeBtns)) {
  el.onclick = () => { tubeMode = k; for (const [k2, el2] of Object.entries(tubeBtns)) el2.classList.toggle('on', k2 === k); };
}
$('binterlace').onclick = () => { interlaced = !interlaced; $('binterlace').classList.toggle('on', interlaced); };
$('b400').onclick = () => {
  const on = $('b400').classList.toggle('on');
  line2 = on ? 1.0 : 0.55;
  for (const tb of Object.values(tubes)) tb.setGeometry({ scanlineDepth: on ? 0.3 : 1.0, beamHeight: on ? 1.0 : 0.35 });
};
$('kfocus').oninput = (e) => { knobs.focus = +e.target.value; for (const t of Object.values(tubes)) t.beamWidth = knobs.focus; };
const regeo = () => {
  for (const t of Object.values(tubes)) {
    t.setGeometry({ hSize: knobs.hSize, vSize: knobs.vSize, maskPitch: knobs.pitch, convergence: knobs.conv, barrel: knobs.barrel });
  }
};
$('khsize').oninput = (e) => { knobs.hSize = +e.target.value; regeo(); };
$('kvsize').oninput = (e) => { knobs.vSize = +e.target.value; regeo(); };
$('kbright').oninput = (e) => { knobs.bright = +e.target.value; };
$('kpitch').oninput = (e) => { knobs.pitch = +e.target.value; regeo(); };
$('kconv').oninput = (e) => { knobs.conv = +e.target.value; regeo(); };
$('kbarrel').oninput = (e) => { knobs.barrel = +e.target.value; regeo(); };
$('kcontrast').oninput = (e) => { knobs.contrast = +e.target.value; };
$('ktint').oninput = (e) => { knobs.tint = (+e.target.value) * Math.PI / 180; }; // 度→rad、NTSCのTINTつまみ
$('ctint').onchange = (e) => { knobs.tintOn = e.target.checked; };
$('cflick').onchange = (e) => { knobs.flickerOn = e.target.checked; };
$('kvhold').oninput = (e) => { knobs.vhold = +e.target.value; };
$('cghost').onchange = (e) => {
  knobs.ghost = e.target.checked ? 0.07 : 0; // inner-glass reflection off = modern AR-coated fantasy
  for (const tb of Object.values(tubes)) tb.ghost = knobs.ghost;
};
