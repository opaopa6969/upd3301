<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ttyd — 1979 CRT</title>
<!--
  ttyd client page with the CRT renderer. Two lives:
  - dev: served from the repo root (python3 serve.py), the BUNDLE block below
    imports ./crt-xterm.js as real ES modules. No ttyd behind it → the page
    drops into a local-echo DEMO mode so you can still see the glass.
  - dist: `node xterm/build.mjs` inlines crt-xterm.js + crt.js + tube.js +
    demo/font.js into the BUNDLE block and writes xterm/dist/ttyd-crt.html —
    a single file you hand to `ttyd --index`.
  xterm.js itself stays on the CDN (MIT, not our code to embed).

  ttyd protocol (verified against ttyd main, html/src/components/terminal/
  xterm/index.ts): WebSocket subprotocol 'tty', binary frames; client sends
  {AuthToken, columns, rows} JSON on open, then '0'+input / '1'+resize JSON /
  '2' pause / '3' resume; server sends '0'+output / '1'+title / '2'+prefs.
  Token comes from GET <base>/token → {token}.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
  html, body { height: 100%; margin: 0; background: #000; overflow: hidden; }
  #terminal { position: absolute; inset: 0; padding: 8px; }
  .xterm .xterm-viewport { background: #000; }
  /* panel: top-right, collapsible, out of the phosphor's way */
  #panel {
    position: fixed; top: 8px; right: 8px; z-index: 100;
    font: 12px ui-monospace, monospace; color: #9ab; user-select: none;
  }
  #panel .head {
    display: flex; gap: 8px; align-items: center; justify-content: flex-end;
  }
  #status { padding: 3px 8px; border-radius: 10px; background: #222; color: #888; }
  #status.on { background: #143; color: #6fa; }
  #status.err { background: #411; color: #f88; }
  #panel button {
    background: #1a1a22; color: #9ab; border: 1px solid #334; border-radius: 4px;
    padding: 3px 10px; cursor: pointer; font: inherit;
  }
  #panel button.on { background: #253; border-color: #4a6; color: #cfd; }
  #body {
    margin-top: 6px; background: rgba(10,10,16,.92); border: 1px solid #334;
    border-radius: 6px; padding: 10px; display: grid; gap: 7px; min-width: 230px;
  }
  #body label { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
  #body select, #body input[type=range] { width: 130px; }
  #body select { background: #111; color: #9ab; border: 1px solid #334; }
  #body.hidden { display: none; }
</style>
</head>
<body>
<div id="terminal"></div>
<div id="panel">
  <div class="head">

  </div>
</div>

//
// Everything below the μPD3301 is digital and frame-atomic; this module is
// where photons happen. A phosphor is characterized here by:
//
// - Two-component decay per gun. Real phosphor decay is roughly hyperbolic;
//   we approximate it with a fast "flash" component and a slow "afterglow"
//   tail, each exponential:
//     fast(t+dt) = max(fast · e^(-dt/tauFast), drive)
//     tail(t+dt) = max(tail · e^(-dt/tauTail), drive · tailFrac)

//   real P22 tube blue dies first and red lingers, so a white flash decays
//   through an orange ghost. That falls out of the numbers here.

//   its own color (`tailPrimaries`) — that's the P7 radar phosphor: a
//   blue-white flash whose afterglow is yellow-green.

//   Leave a screen up long enough and its ghost stays. Off by default.
//

// phosphor is visible at 60 Hz frame granularity — not colorimetry.
//
// Pure, zero deps, deterministic. Suite-contract compliant.

    tailTau: [0.15, 0.08, 0.05],

    primaries: [[1, 0.22, 0.12], [0.2, 1, 0.16], [0.14, 0.18, 1]],

    primaries: [[1, 0.22, 0.12], [0.2, 1, 0.16], [0.14, 0.18, 1]],

  P39: {

    tau: [0.2, 0.2, 0.2],
    tailTau: [0.55, 0.55, 0.55],
    tailFrac: [0.08, 0.08, 0.08],
    // every gun lands on the same green phosphor, weighted like luma
    primaries: [[0.09, 0.3, 0.05], [0.16, 0.55, 0.09], [0.04, 0.15, 0.02]],
  },
  AMBER: {
    name: 'amber mono CRT (Apple II era)',
    tau: [0.045, 0.045, 0.045],
    tailTau: [0.18, 0.18, 0.18],
    tailFrac: [0.03, 0.03, 0.03],
    // one amber phosphor, all guns land on it (luma-weighted)
    primaries: [[0.35, 0.22, 0.02], [0.55, 0.34, 0.03], [0.15, 0.09, 0.01]],
  },
  PLASMA: {
    name: 'neon gas plasma (orange)',

    // cell stops firing — but AC plasma cells latch (memory), so a lit
    // pixel refreshes every frame and never flickers. Neon glow ~585nm.

    tailTau: [0.01, 0.01, 0.01],
    tailFrac: [0.0, 0.0, 0.0],
    primaries: [[0.35, 0.16, 0.01], [0.55, 0.25, 0.02], [0.15, 0.07, 0.005]],
  },
  P7: {
    name: 'P7 (radar: blue flash, yellow afterglow)',
    tau: [0.004, 0.004, 0.004],
    tailTau: [0.9, 0.9, 0.9],
    tailFrac: [0.16, 0.16, 0.16],
    primaries: [[0.35, 0.45, 1], [0.35, 0.45, 1], [0.35, 0.45, 1]].map(

    tailPrimaries: [[0.75, 0.9, 0.15], [0.75, 0.9, 0.15], [0.75, 0.9, 0.15]].map(

  // `tau: [r,g,b]` (single-exponential, identity emission — handy in tests).

  // dt the time since the previous pass (typically 1/60 s).

      const D = this.dose ? this.dose[gun] : null;
      const dFast = Math.exp(-dt / this.tau[gun]);
      const dTail = Math.exp(-dt / this.tailTau[gun]);
      const frac = this.tailFrac[gun];
      const shift = gun === 0 ? 1 : gun === 1 ? 2 : 0; // R=bit1, G=bit2, B=bit0

            const et = e * frac;
            if (et > t) t = et;

          F[i] = f;
          T[i] = t;

      const [pr, pg, pb] = this.primaries[gun];
      const [tr, tg, tb] = this.tailPrimaries[gun];

      g: this.fast[1][i] + this.tail[1][i],

// back to RGB, precombined into one 3x3 matrix (row-major, length 9).
function tintMatrix(rad) {
  const A = [ // RGB → YIQ
    [0.299, 0.587, 0.114],
    [0.596, -0.274, -0.322],
    [0.211, -0.523, 0.312],

    const [a, b, c0, d, e, f, g, h, i] = m.flat();
    const det = a * (e * i - f * h) - b * (d * i - f * g) + c0 * (d * h - e * g);
    return [
      [(e * i - f * h) / det, (c0 * h - b * i) / det, (b * f - c0 * e) / det],
      [(f * g - d * i) / det, (a * i - c0 * g) / det, (c0 * d - a * f) / det],
      [(d * h - e * g) / det, (b * g - a * h) / det, (a * e - b * d) / det],

  const R = [[1, 0, 0], [0, c, -s], [0, s, c]];

// each field starts drawing at a shifted line — the picture rolls, and the
// vertical blanking interval sweeps through as a dark band. Remap rows
// with wraparound over (height + blankLines); rows landing in the VBI go
// dark. bpp: bytes per pixel (1 for GRB-indexed frames, 4 for RGBA).
// stretch != 1 warps the row mapping nonlinearly — the vertical size
// breathes and lines tear/duplicate, which is what a badly detuned
// oscillator really looks like (it never rolls smoothly).

  const total = height + blankLines;

  for (let y = 0; y < height; y++) {
    let s = Math.floor(y * stretch + offsetLines) % total;
    if (s < 0) s += total;
    const o = y * rowBytes;
    if (s < height) dst.set(src.subarray(s * rowBytes, (s + 1) * rowBytes), o);

//
// Sits after the phosphor layer (crt.js). The phosphor gives per-dot
// luminance on a perfect grid; the tube makes it look like television:
//

//   The spot straddles neighboring mask openings, so edges bleed color —

// - Oblique landing: the beam leaves one gun and is deflected; at the

    setStatus('disconnected', 'err');
    if (ev.code !== 1000) setTimeout(connect, 2000); // ttyd-style auto-reconnect
  };
}

// No ttyd behind the page (dev preview): local echo, so the tube still glows.
function enterDemo() {
  demo = true;
  setStatus('demo (no ttyd)', 'err');
  term.write('\x1b[2J\x1b[H');
  term.write('\x1b[7m 1979 CRT — demo mode \x1b[0m\r\n\r\n');
  term.write('No ttyd endpoint at ' + wsUrl + '\r\n');
  term.write('Serve this file via `ttyd --index ...` for a real shell.\r\n');
  term.write('\x1b[31mR\x1b[32mG\x1b[34mB\x1b[33mY\x1b[35mM\x1b[36mC\x1b[0m ');
  term.write('\x1b[7mREVERSE\x1b[0m \x1b[4mUNDER\x1b[0m \x1b[5mBLINK\x1b[0m — local echo below:\r\n\r\n$ ');
}

term.onData((d) => {
  if (demo) { term.write(d === '\r' ? '\r\n$ ' : d); return; }
  if (ws?.readyState === 1) ws.send(enc.encode('0' + d));
});
term.onBinary((d) => {
  if (ws?.readyState !== 1) return;
  const buf = new Uint8Array(d.length + 1);
  buf[0] = '0'.charCodeAt(0);
  for (let i = 0; i < d.length; i++) buf[i + 1] = d.charCodeAt(i) & 255;
  ws.send(buf);
});
term.onResize(sendResize);
window.addEventListener('resize', () => fitAddon.fit());

connect();
</script>
</body>
